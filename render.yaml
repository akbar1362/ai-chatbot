services:
  - type: worker
    name: ai-chatbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m ai_bot.main
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.7"
